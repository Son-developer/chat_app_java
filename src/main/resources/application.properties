# Thông tin kết nối lấy từ tab Variables trên Railway
spring.datasource.url=jdbc:postgresql://[ĐIỀN_PGHOST_TỪ_RAILWAY]:5432/railway
spring.datasource.username=postgres
spring.datasource.password=[ĐIỀN_PGPASSWORD_TỪ_RAILWAY]
spring.datasource.driver-class-name=org.postgresql.Driver

# QUAN TRỌNG: Dòng này giúp Spring Boot tự tạo bảng
spring.jpa.hibernate.ddl-auto=update

# Các cấu hình khác
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=${PORT:8080}