# 1. Cấu hình kết nối PostgreSQL (Thay các thông tin từ Railway của bạn vào đây)
spring.datasource.url=jdbc:ĐÁN_CÁI_LINK_DATABASE_URL_VÀO_ĐÂY
spring.datasource.username=Đnetwork_USER_Ở_RAILWAY
spring.datasource.password=ĐIỀN_PASSWORD_Ở_RAILWAY
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Cấu hình Hibernate tự động tạo bảng dữ liệu
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Hiển thị câu lệnh SQL ở bảng Console để dễ theo dõi
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true