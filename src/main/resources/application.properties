server.port=8080

# 1. Cấu hình mặc định cho LOCAL (Sử dụng H2)
spring.datasource.url=jdbc:h2:mem:chatdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Bật console H2 để bạn xem local cho tiện
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

---
# 2. Cấu hình tự động ghi đè khi chạy trên RAILWAY (Sử dụng Postgres)
# Đoạn này chỉ kích hoạt khi ứng dụng chạy trên môi trường có tên là "production"
spring.config.activate.on-profile=production

spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect