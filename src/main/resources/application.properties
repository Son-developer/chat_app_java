// cấu hình cổng server
server.port=${PORT:8080}          // chạy cổng 8080, Railway tự đổi

// cấu hình cơ sở dữ liệu
spring.datasource.url=...         // địa chỉ database (H2 local hoặc PostgreSQL Railway)
spring.datasource.username=...    // tên đăng nhập database
spring.datasource.password=...    // mật khẩu database
spring.jpa.hibernate.ddl-auto=update  // tự động tạo bảng khi chạy
spring.jpa.show-sql=false         // không in câu SQL ra terminal
spring.servlet.multipart.max-file-size=10MB   // giới hạn file upload 10MB
spring.servlet.multipart.max-request-size=10MB // giới hạn request 10MB