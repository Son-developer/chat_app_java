server.port=8080

# Cấu hình sử dụng H2 File (Chạy mượt cả Local lẫn Global)
spring.datasource.url=jdbc:h2:file:./data/chatdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY,VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

# Cấu hình Hibernate cho H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Bật H2 Console để kiểm tra dữ liệu qua web
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true