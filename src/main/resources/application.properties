# Cấu hình file upload (không dùng // ở cuối dòng)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cấu hình Database
# Lưu ý: Thay các dấu ... bằng thông tin thật lấy từ Railway
spring.datasource.url=jdbc:postgresql://<ĐIỀN_HOST_TỪ_RAILWAY>:5432/railway
spring.datasource.username=postgres
spring.datasource.password=<ĐIỀN_PASSWORD_TỪ_RAILWAY>
spring.datasource.driver-class-name=org.postgresql.Driver

# Cấu hình Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true