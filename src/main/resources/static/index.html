<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #1a1a2e;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #login-screen {
            background: #16213e;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 350px;
        }

        #login-screen h2 {
            margin-bottom: 24px;
            color: #6c63ff;
            font-size: 24px;
        }

        #login-screen input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #0f3460;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
        }

        #login-screen button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #6c63ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        #login-screen button:hover {
            background: #5a52d5;
        }

        #chat-screen {
            display: none;
            width: 100%;
            height: 100vh;
        }

        .chat-container {
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 300px;
            background: #6c63ff;
            display: flex;
            flex-direction: column;
        }

        #sidebar-header {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        #sidebar-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #current-user-label {
            font-size: 13px;
            opacity: 0.85;
        }

        #logout-btn {
            padding: 6px 12px;
            background: #ff4757;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        #users {
            overflow-y: auto;
            flex: 1;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.2s;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-item.active {
            background: rgba(255, 255, 255, 0.2);
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }

        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
        }

        #chat-header {
            padding: 16px 20px;
            background: #16213e;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 60%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.mine {
            align-self: flex-end;
            background: #6c63ff;
        }

        .message.theirs {
            align-self: flex-start;
            background: #16213e;
        }

        .message .time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        #chat-input-area {
            padding: 16px;
            background: #16213e;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #message-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: none;
            background: #0f3460;
            color: white;
            font-size: 15px;
        }

        #send-btn {
            padding: 12px 24px;
            background: #6c63ff;
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        #send-btn:hover {
            background: #5a52d5;
        }

        @media (max-width: 600px) {
            #sidebar {
                width: 100%;
                position: absolute;
                top: 0;
                left: 0;
                height: 100vh;
                z-index: 10;
            }

            #chat-area {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                display: none;
            }

            #chat-area.show {
                display: flex;
            }

            #back-btn {
                display: block !important;
            }
        }

        #back-btn {
            display: none;
            padding: 6px 12px;
            background: transparent;
            border: 1px solid white;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            margin-right: 8px;
        }

        #empty-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
        }
    </style>
</head>

<body>
    <!-- Màn hình đăng nhập -->
    <div id="login-screen">
        <h2>Chào mừng đến Chat App</h2>
        <input type="text" id="username-input" placeholder="Nhập tên của bạn..."
            onkeydown="if(event.key==='Enter') login()" />
        <button onclick="login()">Vào chat</button>
    </div>

    <!-- Màn hình chat -->
    <div id="chat-screen">
        <div class="chat-container">
            <!-- Sidebar trái -->
            <div id="sidebar">
                <div id="sidebar-header">
                    <div id="sidebar-header-top">
                        <h3>Danh sách chat</h3>
                        <button id="logout-btn" onclick="logout()">Đăng xuất</button>
                    </div>
                    <div id="current-user-label">👤 Đang đăng nhập: <strong id="current-username"></strong></div>
                </div>
                <div id="users"></div>
            </div>

            <!-- Khung chat phải -->
            <div id="chat-area">
                <div id="chat-header">
                    <button id="back-btn" onclick="goBack()">← Quay lại</button>
                    <span id="chat-with">Chọn người để chat</span>
                </div>
                <div id="empty-chat">Chọn người để bắt đầu chat 💬</div>
                <div id="messages" style="display:none"></div>
                <div id="chat-input-area" style="display:none">
                    <input type="text" id="message-input" placeholder="Nhập tin nhắn..."
                        onkeydown="if(event.key==='Enter') sendMessage()" />
                    <button id="send-btn" onclick="sendMessage()">Gửi</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let selectedUser = null;
        let stompClient = null;

        const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#1abc9c', '#3498db', '#9b59b6', '#e91e63'];

        function getColor(name) {
            let sum = 0;
            for (let c of name) sum += c.charCodeAt(0);
            return colors[sum % colors.length];
        }

        async function login() {
            const username = document.getElementById('username-input').value.trim();
            if (!username) { alert('Vui lòng nhập tên!'); return; }
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: username
            });
            currentUser = await response.json();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'block';
            // Hiện tên người đang đăng nhập
            document.getElementById('current-username').textContent = currentUser.username;
            connectWebSocket();
            loadUsers();
            setInterval(loadUsers, 5000);
        }

        function logout() {
            fetch('/api/auth/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: currentUser.username
            });
            location.reload();
        }

        function goBack() {
            document.getElementById('chat-area').classList.remove('show');
            document.getElementById('sidebar').style.display = 'flex';
        }

        function loadUsers() {
            fetch('/api/messages/users')
                .then(res => res.json())
                .then(users => {
                    const usersDiv = document.getElementById('users');
                    usersDiv.innerHTML = '';
                    users
                        .filter(u => u.username !== currentUser.username)
                        .forEach(u => {
                            const div = document.createElement('div');
                            div.className = 'user-item';
                            div.innerHTML = `
                                <div class="avatar" style="background:${getColor(u.username)}">
                                    ${u.username[0].toUpperCase()}
                                </div>
                                <span>${u.username}</span>
                            `;
                            div.onclick = () => selectUser(u, div);
                            usersDiv.appendChild(div);
                        });
                });
        }

        function selectUser(user, el) {
            selectedUser = user;
            document.querySelectorAll('.user-item').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('chat-with').textContent = 'Chat với ' + user.username;
            document.getElementById('empty-chat').style.display = 'none';
            document.getElementById('messages').style.display = 'flex';
            document.getElementById('chat-input-area').style.display = 'flex';
            if (window.innerWidth <= 600) {
                document.getElementById('sidebar').style.display = 'none';
                document.getElementById('chat-area').classList.add('show');
            }
            loadMessages();
        }

        function loadMessages() {
            fetch(`/api/messages/conversation?user1=${currentUser.username}&user2=${selectedUser.username}`)
                .then(res => res.json())
                .then(messages => {
                    const messagesDiv = document.getElementById('messages');
                    messagesDiv.innerHTML = '';
                    messages.forEach(m => addMessage(m));
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                });
        }

        function addMessage(m) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            const isMine = m.sender === currentUser.username;
            const time = new Date(m.sentAt).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
            div.className = 'message ' + (isMine ? 'mine' : 'theirs');
            div.innerHTML = `<div>${m.content}</div><div class="time">${time}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const content = document.getElementById('message-input').value.trim();
            if (!content || !selectedUser) return;
            const message = {
                sender: currentUser.username,
                receiver: selectedUser.username,
                content: content,
                sentAt: new Date()
            };
            stompClient.send('/app/chat', {}, JSON.stringify(message));
            addMessage(message);
            document.getElementById('message-input').value = '';
        }

        function connectWebSocket() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({}, () => {
                stompClient.subscribe('/topic/chat/' + currentUser.username, (msg) => {
                    const message = JSON.parse(msg.body);
                    if (selectedUser && message.sender === selectedUser.username) {
                        addMessage(message);
                    }
                });
            });
        }
    </script>
</body>

</html>
